<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Botafogo Scout Rankings – MAR/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Dark theme — deep navy inspired by ScorePulse */
  --bg:#0B0E1A;
  --bg2:#0F1322;
  --panel:#131829;
  --panel2:#181E30;
  --gold:#E8C56A;--gold2:#A88640;--gold3:#2A2010;--gold-bg:#16120A;
  --band:#1A2035;--lg-bg:#1C2238;--ch-bg:#202840;
  --ra:#131829;--rb:#161E32;
  --t1:#F0F4FF;--t2:#8892B0;--t3:#3A4460;
  --sm:#FFD166;--sb:#4FA3E8;--sy:#56D17A;
  --sep:#1E2845;
  --r:14px;--r-sm:10px;--r-xs:7px;
  --hh:56px;--ws:76px;
  --glow-gold:0 0 18px rgba(232,197,106,.18);
  --glow-blue:0 0 18px rgba(79,163,232,.18);
  --card-shadow:0 4px 32px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.04) inset;
  --card-shadow-hover:0 8px 40px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.06) inset;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:12px;overflow:hidden}

/* ── Subtle animated mesh background ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, rgba(79,163,232,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 80%, rgba(232,197,106,.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(86,209,122,.03) 0%, transparent 60%);
}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:rgba(15,19,34,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(232,197,106,.12);box-shadow:0 2px 24px rgba(0,0,0,.4);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
#logo{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:1.5px;white-space:nowrap;font-family:'Space Mono',monospace}
#logo span{font-size:7px;color:var(--t2);display:block;letter-spacing:3px;font-weight:400}
#mbadge{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0B0E1A;font-weight:700;font-size:9px;padding:3px 10px;border-radius:20px;letter-spacing:1.5px;box-shadow:0 2px 8px rgba(232,197,106,.3)}
#tabs{display:flex;gap:4px;margin-left:auto}
.tb{background:transparent;border:1px solid rgba(255,255,255,.08);color:var(--t2);padding:5px 14px;cursor:pointer;border-radius:20px;font-size:11px;font-weight:600;transition:all .2s;font-family:'DM Sans',sans-serif}
.tb:hover{background:rgba(255,255,255,.06);color:var(--t1);border-color:rgba(255,255,255,.16)}
.tb.on{background:linear-gradient(135deg,var(--gold),#B8933A);color:#0B0E1A;border-color:transparent;box-shadow:0 2px 12px rgba(232,197,106,.35)}
#fbar{display:flex;gap:5px;margin-left:12px}
.fb{background:transparent;border:1px solid rgba(255,255,255,.08);color:var(--t2);padding:4px 11px;cursor:pointer;border-radius:20px;font-size:10px;font-weight:600;transition:all .2s}
.fb:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.fb.on[data-f="all"]{background:rgba(232,197,106,.14);color:var(--gold);border-color:rgba(232,197,106,.4)}
.fb.on[data-f="main"]{background:rgba(255,209,102,.14);color:var(--sm);border-color:rgba(255,209,102,.4)}
.fb.on[data-f="backup"]{background:rgba(79,163,232,.14);color:var(--sb);border-color:rgba(79,163,232,.4)}
.fb.on[data-f="youth"]{background:rgba(86,209,122,.14);color:var(--sy);border-color:rgba(86,209,122,.4)}
#leg{font-size:8px;color:var(--t2);white-space:nowrap;margin-left:6px;display:flex;align-items:center;gap:8px}
#leg span{display:flex;align-items:center;gap:3px}

/* ── SIDEBAR ── */
#sb{position:fixed;top:var(--hh);left:0;bottom:0;width:var(--ws);background:rgba(13,17,30,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-right:1px solid rgba(255,255,255,.05);overflow-y:auto;z-index:50;padding:8px 5px}
#sb::-webkit-scrollbar{width:3px}#sb::-webkit-scrollbar-thumb{background:rgba(232,197,106,.2);border-radius:4px}
.pb{width:100%;background:transparent;border:none;color:var(--t2);padding:7px 0;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.5px;text-align:center;border-radius:var(--r-xs);margin-bottom:3px;transition:all .18s;border-left:2px solid transparent;font-family:'DM Sans',sans-serif}
.pb small{display:block;font-size:7px;opacity:.6;margin-top:2px;font-weight:400;letter-spacing:.3px}
.pb:hover{background:rgba(232,197,106,.08);color:var(--gold);border-left-color:rgba(232,197,106,.3)}
.pb.on{background:rgba(232,197,106,.12);color:var(--gold);border-left-color:var(--gold)}

/* ── MAIN ── */
#main{position:fixed;top:var(--hh);left:var(--ws);right:0;bottom:0;overflow-y:auto;padding:14px;z-index:1}
#main::-webkit-scrollbar{width:5px}#main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

/* ── RANKINGS ── */
.pp{display:none}.pp.on{display:block}
.pt{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.pt h2{font-size:17px;color:var(--gold);font-weight:700;font-family:'Space Mono',monospace;letter-spacing:1px}
.pt h3{font-size:10px;color:var(--t2);font-weight:400}
.band{margin-bottom:10px}
.bh{background:linear-gradient(90deg,rgba(26,32,53,.95),rgba(19,24,41,.7));padding:6px 12px;display:flex;align-items:center;gap:10px;border-left:3px solid var(--gold);border-radius:var(--r-xs) var(--r-xs) 0 0;border:1px solid rgba(232,197,106,.15);border-left:3px solid var(--gold);backdrop-filter:blur(4px)}
.bt{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1.2px;font-family:'Space Mono',monospace}
.bl{font-size:7px;color:var(--t2);font-weight:500;margin-left:auto;letter-spacing:.5px}
.bts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;padding:3px;background:rgba(10,13,25,.5);border-radius:0 0 var(--r-sm) var(--r-sm);border:1px solid rgba(255,255,255,.04);border-top:none}
.lt{overflow:hidden;border-radius:var(--r-xs);background:var(--ra);border:1px solid rgba(255,255,255,.05);transition:box-shadow .2s}
.lt:hover{box-shadow:0 4px 20px rgba(0,0,0,.4)}
.ln{background:linear-gradient(90deg,rgba(28,34,56,.95),rgba(22,27,48,.9));padding:6px 10px;font-size:13px;font-weight:700;color:var(--gold);text-align:center;letter-spacing:.8px;border-bottom:1px solid rgba(232,197,106,.12)}
.ch{display:grid;background:rgba(18,22,42,.8);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.chc{font-size:10px;font-weight:700;color:var(--t3);text-align:center;text-transform:uppercase;letter-spacing:.5px;padding:3px 2px}
.pr{display:grid;align-items:center;padding:3px 0;transition:all .12s;cursor:default;position:relative}
.pr:nth-child(odd){background:rgba(19,24,41,.6)}.pr:nth-child(even){background:rgba(22,28,48,.4)}
.pr:hover{background:rgba(232,197,106,.06)}.pr.dim{opacity:.18}

/* ── INDICADOR DE LISTA: borda colorida à esquerda ── */
/* A ::before cria uma faixa colorida sem afetar o grid nem o hover */
.pr[data-y="true"]::before,
.pr[data-b="true"]::before,
.pr[data-m="true"]::before{
  content:'';position:absolute;left:0;top:1px;bottom:1px;
  width:3px;border-radius:0 2px 2px 0;pointer-events:none
}
/* Prioridade: main sobrescreve backup, backup sobrescreve youth */
.pr[data-y="true"]::before{background:var(--sy);opacity:.85}
.pr[data-b="true"]::before{background:var(--sb);opacity:.85}
.pr[data-m="true"]::before{background:var(--sm);opacity:.9}
/* Fundo levíssimo para reforçar a identificação */
.pr[data-y="true"]{background:rgba(86,209,122,.03)}
.pr[data-b="true"]{background:rgba(79,163,232,.03)}
.pr[data-m="true"]{background:rgba(255,209,102,.04)}
/* Hover preserva a borda mas reforça o fundo */
.pr:hover[data-y="true"]{background:rgba(86,209,122,.08)}
.pr:hover[data-b="true"]{background:rgba(79,163,232,.08)}
.pr:hover[data-m="true"]{background:rgba(255,209,102,.08)}
.c{font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 4px}
.cn{text-align:center;color:var(--t3);font-family:'Space Mono',monospace;font-size:11px}
.cname{font-weight:600;color:var(--t1)}
.covr{text-align:center;font-weight:700;font-size:13px;font-family:'Space Mono',monospace}
.cclub{color:var(--t2);font-size:12px}.cage{text-align:center;color:var(--t2);font-size:12px}.ccon{text-align:center;color:var(--t2);font-size:11px}
.cs{display:flex;justify-content:center;align-items:center;gap:2px}
/* Chips M/B/Y — substituem as estrelas anônimas */
.s{display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1px solid rgba(255,255,255,.1);cursor:pointer;
  font-size:9px;font-weight:700;font-family:'Space Mono',monospace;
  color:var(--t3);padding:2px 4px;border-radius:3px;line-height:1;
  transition:all .15s;opacity:.28;letter-spacing:.3px;min-width:16px}
.s:hover{opacity:.7;transform:scale(1.08)}
.s.on{opacity:1;border-color:currentColor}
.s[data-l="main"].on{color:var(--sm);background:rgba(255,209,102,.13);box-shadow:0 0 6px rgba(255,209,102,.25)}
.s[data-l="backup"].on{color:var(--sb);background:rgba(79,163,232,.13);box-shadow:0 0 6px rgba(79,163,232,.25)}
.s[data-l="youth"].on{color:var(--sy);background:rgba(86,209,122,.13);box-shadow:0 0 6px rgba(86,209,122,.25)}

/* ── LISTAS TAB ── */
#tlists{display:none}
.lh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lh h2{font-size:15px;color:var(--gold);font-weight:700;letter-spacing:1.5px;font-family:'Space Mono',monospace}
.lstabs{display:flex;gap:4px}
.lstb{background:transparent;border:1px solid rgba(255,255,255,.08);color:var(--t2);padding:5px 13px;cursor:pointer;border-radius:20px;font-size:10px;font-weight:600;transition:all .2s}
.lstb:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.lstb.on[data-ls="main"]{background:rgba(255,209,102,.16);color:var(--sm);border-color:rgba(255,209,102,.45);box-shadow:0 2px 10px rgba(255,209,102,.12)}
.lstb.on[data-ls="backup"]{background:rgba(79,163,232,.16);color:var(--sb);border-color:rgba(79,163,232,.45);box-shadow:0 2px 10px rgba(79,163,232,.12)}
.lstb.on[data-ls="youth"]{background:rgba(86,209,122,.16);color:var(--sy);border-color:rgba(86,209,122,.45);box-shadow:0 2px 10px rgba(86,209,122,.12)}
.lstb.on[data-ls="starred"]{background:rgba(232,197,106,.16);color:var(--gold);border-color:rgba(232,197,106,.45);box-shadow:0 2px 10px rgba(232,197,106,.12)}
#lbody{margin-top:4px}

/* ── Scout list sections ── */
.lsec{margin-bottom:14px}
.lsech{display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,rgba(26,32,53,.9),rgba(18,22,42,.6));padding:6px 12px;border-left:3px solid var(--gold2);margin-bottom:4px;border-radius:0 var(--r-xs) var(--r-xs) 0;border:1px solid rgba(255,255,255,.05);border-left:3px solid var(--gold2)}
.lsech span{font-size:8px;font-weight:700;color:var(--gold2);letter-spacing:1px;font-family:'Space Mono',monospace}
.lsech small{font-size:7.5px;color:var(--t2);margin-left:auto}
.lgrid{display:flex;flex-wrap:wrap;gap:5px;padding:3px 0}
.lpill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:600;transition:all .15s;cursor:default}
.lpill.found{background:rgba(232,197,106,.1);border:1px solid rgba(232,197,106,.22);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.lpill.found:hover{background:rgba(232,197,106,.16)}
.lpill.notfound{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:var(--t3)}
.lpill .lname{color:var(--t1)}.lpill.notfound .lname{color:var(--t3)}
.lovrb{font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px;background:rgba(0,0,0,.3);margin-left:2px;font-family:'Space Mono',monospace}
.lligb{font-size:7px;color:var(--gold2)}.lposb{font-size:7px;color:var(--t2)}
.lstarr{display:flex;gap:2px;margin-left:auto}
.ls2{display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1px solid rgba(255,255,255,.1);cursor:pointer;
  font-size:9px;font-weight:700;font-family:'Space Mono',monospace;
  color:var(--t3);padding:2px 4px;border-radius:3px;line-height:1;
  transition:all .15s;opacity:.28;letter-spacing:.3px;min-width:16px}
.ls2:hover{opacity:.7}.ls2.on{opacity:1;border-color:currentColor}
.ls2[data-l="main"].on{color:var(--sm);background:rgba(255,209,102,.13)}
.ls2[data-l="backup"].on{color:var(--sb);background:rgba(79,163,232,.13)}
.ls2[data-l="youth"].on{color:var(--sy);background:rgba(86,209,122,.13)}

/* ── Starred players table ── */
#stbl{width:100%;border-collapse:separate;border-spacing:0 2px}
#stbl th{background:rgba(22,27,48,.95);color:var(--t2);font-size:8.5px;font-weight:700;padding:7px 9px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;user-select:none}
#stbl th:hover{background:rgba(28,34,58,.95);color:var(--gold)}
#stbl th.sort-asc::after{content:" ▲";font-size:8px;color:var(--gold)}
#stbl th.sort-desc::after{content:" ▼";font-size:8px;color:var(--gold)}
#stbl td{padding:6px 9px;font-size:9.5px;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap;vertical-align:middle;background:rgba(15,19,34,.6)}
#stbl tr:nth-child(even) td{background:rgba(19,24,41,.6)}
#stbl tr:hover td{background:rgba(232,197,106,.06)!important}
.bm{display:inline-block;padding:1px 6px;border-radius:10px;font-size:7.5px;font-weight:700;letter-spacing:.5px;margin-right:2px}
.bm-main{background:rgba(255,209,102,.2);color:var(--sm);border:1px solid rgba(255,209,102,.3)}
.bm-backup{background:rgba(79,163,232,.2);color:var(--sb);border:1px solid rgba(79,163,232,.3)}
.bm-youth{background:rgba(86,209,122,.2);color:var(--sy);border:1px solid rgba(86,209,122,.3)}
.empty{text-align:center;padding:40px;color:var(--t2);font-size:12px}
.empty strong{color:var(--gold);display:block;margin-bottom:6px}
#scnt{font-size:9.5px;color:var(--t2);margin-bottom:6px}
.lsumm{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.lscard{background:rgba(20,25,45,.8);border:1px solid rgba(255,255,255,.07);padding:10px 16px;border-radius:var(--r);min-width:128px;box-shadow:var(--card-shadow);transition:all .2s}
.lscard:hover{border-color:rgba(232,197,106,.2);box-shadow:var(--card-shadow-hover)}
.lscard .lct{font-size:9px;font-weight:700;color:var(--gold2);letter-spacing:.8px;margin-bottom:6px;font-family:'Space Mono',monospace}
.lscard .lcn{font-size:22px;font-weight:700;color:var(--gold);line-height:1;font-family:'Space Mono',monospace}
.lscard .lcn2{font-size:10px;color:var(--t2);margin-top:3px}

/* ── Modal ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(5,7,18,.8);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#overlay.open{display:flex}
#modal{background:rgba(18,22,40,.97);border:1px solid rgba(232,197,106,.2);border-radius:var(--r);width:480px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,.7);overflow:hidden}
#mhdr{background:rgba(22,27,48,.9);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(232,197,106,.15)}
#mhdr h3{color:var(--gold);font-size:15px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:1px}
#mclose{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--t2);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
#mclose:hover{background:rgba(255,255,255,.12);color:var(--t1)}
#mform{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfield{display:flex;flex-direction:column;gap:5px}.mfield.full{grid-column:1/-1}
.mfield label{font-size:10px;font-weight:700;color:var(--gold2);letter-spacing:.8px;text-transform:uppercase;font-family:'Space Mono',monospace}
.mfield input,.mfield select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--t1);padding:9px 12px;border-radius:var(--r-sm);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:all .18s}
.mfield input:focus,.mfield select:focus{border-color:var(--gold);background:rgba(232,197,106,.05);box-shadow:0 0 0 3px rgba(232,197,106,.1)}
#mcheck{display:flex;gap:10px;padding:0 18px 8px}
.mck{display:flex;align-items:center;gap:7px;cursor:pointer;padding:9px 14px;border-radius:var(--r-sm);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:600;transition:all .18s;user-select:none;color:var(--t2)}
.mck:hover{background:rgba(255,255,255,.04)}
.mck.active-main{background:rgba(255,209,102,.1);border-color:rgba(255,209,102,.4);color:var(--sm)}
.mck.active-backup{background:rgba(79,163,232,.1);border-color:rgba(79,163,232,.4);color:var(--sb)}
.mck.active-youth{background:rgba(86,209,122,.1);border-color:rgba(86,209,122,.4);color:var(--sy)}
#mfooter{padding:14px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid rgba(255,255,255,.06)}
.mbt{padding:9px 20px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);color:var(--t2);background:rgba(255,255,255,.04);transition:all .18s;font-family:'DM Sans',sans-serif}
.mbt:hover{background:rgba(255,255,255,.08);color:var(--t1)}
.mbt.save{background:linear-gradient(135deg,var(--gold),#B8933A);color:#0B0E1A;border-color:transparent;box-shadow:0 2px 12px rgba(232,197,106,.3)}
.mbt.save:hover{box-shadow:0 4px 18px rgba(232,197,106,.45);transform:translateY(-1px)}
.mbt.del{border-color:rgba(192,57,43,.4);color:#e74c3c;background:rgba(192,57,43,.08)}
.cbadge{font-size:9px;background:rgba(255,255,255,.08);color:var(--t2);padding:1px 6px;border-radius:10px;margin-left:4px}

/* ── LIGHT THEME ── */
body.light{--bg:#EEF0F8;--panel:#FFFFFF;--gold:#8A6200;--gold2:#6A4C00;--gold3:#EDD99A;--gold-bg:#FFF8E7;--band:#E4E7F4;--lg-bg:#EDF0FA;--ch-bg:#DDE0F0;--ra:#FAFBFF;--rb:#F0F2FB;--t1:#111827;--t2:#5A6480;--t3:#B0B8D0;--sm:#9A7000;--sb:#1254A0;--sy:#1A6B3A;--sep:#D4D8EE;--card-shadow:0 4px 20px rgba(0,0,0,.1);--card-shadow-hover:0 8px 32px rgba(0,0,0,.15)}
body.light::before{background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(79,163,232,.04) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(138,98,0,.04) 0%,transparent 60%)}
body.light #hdr{background:rgba(255,255,255,.92);border-bottom-color:rgba(0,0,0,.1);box-shadow:0 2px 20px rgba(0,0,0,.1)}
body.light #logo{color:#6A4C00}body.light #mbadge{background:linear-gradient(135deg,#8A6200,#6A4C00);color:#FFF}
body.light .fb{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:#5A6480}
body.light .fb.on[data-f="all"]{background:rgba(138,98,0,.1);color:#8A6200;border-color:rgba(138,98,0,.3)}

// ─── NAME+CLUB MATCHING ENGINE ────────────────────────────────────────────
// Normalize: remove accents, lowercase, strip non-alphanum
function normStr(s){
  if(!s)return'';
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}

// Fuzzy club name match (accounts for abbreviations & minor differences)
function clubsMatch(a,b){
  if(!a||!b||a==='—'||b==='—')return false;
  const na=normStr(a),nb=normStr(b);
  if(!na||!nb)return false;
  if(na===nb)return true;
  // strip common prefixes
  const strip=s=>s.replace(/^(fc|cf|club|ca|sc|cd|rc|sk|fk|sp|atletico|atleticoclub)/,'');
  const sa=strip(na),sb=strip(nb);
  if(sa.length>=4&&sb.includes(sa.slice(0,Math.min(sa.length,9))))return true;
  if(sb.length>=4&&sa.includes(sb.slice(0,Math.min(sb.length,9))))return true;
  return false;
}

// Build precomputed lookup: norm(name) → [{pk, lg, p}]
const RANK_LOOKUP=new Map();
(function(){
  for(const[pk,pd] of Object.entries(R)){
    for(const[lg,players] of Object.entries(pd.data||{})){
      for(const p of players){
        const k=normStr(p.name);
        if(!RANK_LOOKUP.has(k))RANK_LOOKUP.set(k,[]);
        RANK_LOOKUP.get(k).push({pk,lg,p});
      }
    }
  }
})();

// Resolve match for a list player using name + clube as composite key
// Returns {pk, lg, p, pid} or null
function resolveMatch(name, clube){
  const k=normStr(name);
  const candidates=RANK_LOOKUP.get(k)||[];
  if(!candidates.length)return null;
  // Try exact club match first
  if(clube&&clube!=='—'){
    const withClub=candidates.filter(c=>clubsMatch(c.p.club,clube));
    if(withClub.length>=1){
      const m=withClub[0];
      return{...m,pid:`${m.pk}|${m.lg}|${m.p.name}|${m.p.age}`};
    }
  }
  // If only one candidate and no club available → accept (unambiguous)
  if(candidates.length===1&&(!clube||clube==='—')){
    const m=candidates[0];
    return{...m,pid:`${m.pk}|${m.lg}|${m.p.name}|${m.p.age}`};
  }
  // Multiple candidates without matching club → ambiguous, don't match
  return null;
}

// Enrich a list player with correct runtime match data
function enrichListPlayer(p){
  const match=resolveMatch(p.name,p.clube);
  if(!match)return{...p,found:false,pk:null,lg:null,ovr:null,club:null,pid:null};
  return{...p,found:true,pk:match.pk,lg:match.lg,ovr:match.p.ovr,club:match.p.club,pid:match.pid};
}

function tgS(btn){

function saveCustom(){const name=document.getElementById('mname').value.trim();if(!name){document.getElementById('mname').style.borderColor='#c0392b';return;}document.getElementById('mname').style.borderColor='';const c=loadCustom();const entry={id:editId||('c_'+Date.now()),name,pos:document.getElementById('mpos').value,league:document.getElementById('mleague').value.trim()||'—',ovr:parseFloat(document.getElementById('movr').value)||null,club:document.getElementById('mclub').value.trim()||'—',age:parseInt(document.getElementById('mage').value)||'—',contract:document.getElementById('mcontract').value.trim()||'—',main:document.getElementById('mch-main').checked,backup:document.getElementById('mch-backup').checked,youth:document.getElementById('mch-youth').checked};if(editId){const i=c.findIndex(x=>x.id===editId);if(i>=0)c[i]=entry;else c.push(entry);}else c.push(entry);saveCustomList(c);closeModal();renderLists();}
function deleteCustom(){if(!editId)return;saveCustomList(loadCustom().filter(x=>x.id!==editId));closeModal();renderLists();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeEditRow();}});
// ─── ROW OVERRIDES (localStorage edits for list players & ranking players) ───
const OVKEY='bot_overrides_mar26';
function loadOverrides(){try{return JSON.parse(localStorage.getItem(OVKEY)||'{}')}catch(e){return{}}}
function saveOverrides(obj){localStorage.setItem(OVKEY,JSON.stringify(obj))}
function getOverride(key){return loadOverrides()[key]||null}

// ─── EDIT ROW MODAL ───────────────────────────────────────────────────────
let _erKey=null,_erIsRank=false;

function toggleErck(l){
  const cb=document.getElementById('erch-'+l);
  cb.checked=!cb.checked;
  document.getElementById('erck-'+l).classList.toggle('active-'+l,cb.checked);
}
function _setErckState(lists){
  ['main','backup','youth'].forEach(l=>{
    const val=!!(lists&&lists[l]);
    document.getElementById('erch-'+l).checked=val;
    document.getElementById('erck-'+l).classList.toggle('active-'+l,val);
  });
}

function openListEdit(r){
  _erIsRank=false;
  _erKey='list||'+r.name+'||'+(r.pk||r.pos_map||'—');
  const ov=getOverride(_erKey)||{};
  document.getElementById('editRowTitle').textContent='EDITAR — '+r.name;
  document.getElementById('er_name').value=ov.name||r.name||'';
  document.getElementById('er_club').value=ov.club||(r.clube||r.club_rank||'');
  document.getElementById('er_contract').value=ov.contract||(r.contrato||'');
  document.getElementById('er_ovr').value=ov.ovr!==undefined?ov.ovr:(r.ovr||'');
  document.getElementById('er_age').value=ov.age!==undefined?ov.age:(r.idade||'');
  document.getElementById('er_nasc').value=ov.nasc!==undefined?ov.nasc:(r.nasc||'');
  // List membership: use override if exists, else current row.lists
  _setErckState(ov.lists!==undefined?ov.lists:r.lists);
  document.getElementById('er_lists_section').style.display='';
  document.getElementById('erResetBtn').style.display=(ov.name||ov.lists)?'':'none';
  document.getElementById('editRowNote').textContent='Edições salvas localmente · não altera o ranking base';
  document.getElementById('editRowModal').classList.add('open');
  document.getElementById('er_name').focus();
}

function openRankEdit(pk,lg,p){
  _erIsRank=true;
  _erKey='rank||'+pk+'||'+lg+'||'+p.name+'||'+p.age;
  const ov=getOverride(_erKey)||{};
  document.getElementById('editRowTitle').textContent='EDITAR RANKING — '+p.name;
  document.getElementById('er_name').value=ov.name||p.name||'';
  document.getElementById('er_club').value=ov.club||p.club||'';
  document.getElementById('er_contract').value=ov.contract||p.contract||'';
  document.getElementById('er_ovr').value=ov.ovr!==undefined?ov.ovr:(p.ovr||'');
  document.getElementById('er_age').value=ov.age!==undefined?ov.age:p.age;
  document.getElementById('er_nasc').value='';
  // Hide lists section for ranking edit
  document.getElementById('er_lists_section').style.display='none';
  document.getElementById('erResetBtn').style.display=ov.name?'':'none';
  document.getElementById('editRowNote').textContent='Override do ranking · salvo localmente';
  document.getElementById('editRowModal').classList.add('open');
  document.getElementById('er_name').focus();
}

function closeEditRow(){document.getElementById('editRowModal').classList.remove('open');_erKey=null;}

function saveEditRow(){
  if(!_erKey)return;
  const ov={
    name:document.getElementById('er_name').value.trim()||undefined,
    club:document.getElementById('er_club').value.trim()||undefined,
    contract:document.getElementById('er_contract').value.trim()||undefined,
    ovr:document.getElementById('er_ovr').value!==''?parseFloat(document.getElementById('er_ovr').value):undefined,
    age:document.getElementById('er_age').value!==''?parseInt(document.getElementById('er_age').value):undefined,
    nasc:document.getElementById('er_nasc').value!==''?parseInt(document.getElementById('er_nasc').value):undefined,
  };
  // Save list membership override only for list players
  if(!_erIsRank){
    ov.lists={
      main:document.getElementById('erch-main').checked,
      backup:document.getElementById('erch-backup').checked,
      youth:document.getElementById('erch-youth').checked,
    };
  }
  // Remove undefined keys
  Object.keys(ov).forEach(k=>{if(ov[k]===undefined)delete ov[k];});
  const all=loadOverrides();
  all[_erKey]=ov;
  saveOverrides(all);
  closeEditRow();
  if(_erIsRank){rRanks();}
  else{renderLists();}
}

function resetEditRow(){
  if(!_erKey)return;
  const all=loadOverrides();
  delete all[_erKey];
  saveOverrides(all);
  closeEditRow();
  if(_erIsRank){rRanks();}
  else{renderLists();}
}

function applyRankOverride(pk,lg,p){
  const key='rank||'+pk+'||'+lg+'||'+p.name+'||'+p.age;
  const ov=getOverride(key);
  if(!ov)return p;
  return {...p,name:ov.name||p.name,club:ov.club||p.club,contract:ov.contract||p.contract,ovr:ov.ovr!==undefined?ov.ovr:p.ovr,age:ov.age!==undefined?ov.age:p.age};
}

function applyListOverride(r){
  const key='list||'+r.name+'||'+(r.pk||r.pos_map||'—');
  const ov=getOverride(key);
  if(!ov)return r;
  return{...r,name:ov.name||r.name,clube:ov.club||r.clube||r.club_rank,contrato:ov.contract||r.contrato,ovr:ov.ovr!==undefined?ov.ovr:r.ovr,idade:ov.age!==undefined?ov.age:r.idade,nasc:ov.nasc!==undefined?ov.nasc:r.nasc};
}

// ─── LIST FILTERS ─────────────────────────────────────────────────────────
let _listFilters={nome:'',pos:'',lista:'',ranked:''};

function applyListFilters(rows){
  const n=_listFilters.nome.toLowerCase();
  const p=_listFilters.pos;
  const l=_listFilters.lista;
  const r=_listFilters.ranked;
  return rows.filter(row=>{
    if(n && !row.name.toLowerCase().includes(n))return false;
    if(p && row.pk!==p)return false;
    if(l==='main'&&!row.lists.main)return false;
    if(l==='backup'&&!row.lists.backup)return false;
    if(l==='youth'&&!row.lists.youth)return false;
    if(r==='yes'&&!row.found)return false;
    if(r==='no'&&row.found)return false;
    return true;
  });
}
function rCustomPill(p){return `<div class="lpill found" style="cursor:pointer" onclick="openAddModal('${p.id}')">${p.name}${p.ovr?`<span class="lovrb" style="color:${oc(p.ovr)}">${p.ovr}</span>`:''}<span class="cbadge">✏</span></div>`;}
let _sc='pk',_sd=1;
function sortStbl(col){if(_sc===col)_sd*=-1;else{_sc=col;_sd=col==='ovr'?-1:1;}document.querySelectorAll('#stbl th').forEach(th=>{th.classList.remove('sort-asc','sort-desc');const fn=th.getAttribute('onclick')||'';if(fn.includes("'"+col+"'")){th.classList.add(_sd===1?'sort-asc':'sort-desc');}});const tbody=document.querySelector('#stbl tbody');if(!tbody)return;const rows=[...tbody.querySelectorAll('tr')];const po=POS.map(([k])=>k);rows.sort((a,b)=>{const cv=(tr,c)=>{const cells=[...tr.querySelectorAll('td')];const map={found:0,name:1,lista:2,pk:3,clube:4,nasc:5,idade:6,contrato:7,ovr:8};const idx=map[c];if(idx===undefined)return'';const txt=cells[idx]?.textContent?.trim()||'';if(c==='ovr'||c==='idade'){const n=parseFloat(txt);return isNaN(n)?-999:n;}if(c==='found')return cells[idx]?.querySelector('[style*="gold"]')?1:0;if(c==='pk')return po.indexOf(txt)===-1?99:po.indexOf(txt);if(c==='lista'){const has=v=>cells[idx]?.querySelector('.bm-'+v);const sc=(has('main')?4:0)+(has('backup')?2:0)+(has('youth')?1:0);return sc;}return txt.toLowerCase();};const va=cv(a,_sc),vb=cv(b,_sc);if(va<vb)return -1*_sd;if(va>vb)return 1*_sd;return 0;});rows.forEach(r=>tbody.appendChild(r));}
(function(){const t=localStorage.getItem('bot_theme');if(t==='light'){document.body.classList.add('light');const btn=document.getElementById('themeBtn');if(btn)btn.textContent='🌙';rRanks();}})();

</script>

onclick="toggleMck('youth')"><input type="checkbox" id="mch-youth"> 🟢 YOUTH</label></div><div id="mfooter"><button class="mbt" id="mdelBtn" onclick="deleteCustom()" style="display:none">🗑 Remover</button><button class="mbt" onclick="closeModal()">Cancelar</button><button class="mbt save" onclick="saveCustom()">✓ Salvar</button></div></div></div>
